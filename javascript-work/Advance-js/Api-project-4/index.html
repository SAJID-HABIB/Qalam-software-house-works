<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Product Cards</title>
  <style>
    body { font-family: Arial; margin: 0; padding: 20px; background:#f4f4f4; }
    h1 { display:inline-block; }
    .top { display:flex; justify-content:space-between; align-items:center; }
    .btn { padding:8px 12px; border:none; cursor:pointer; border-radius:5px; }
    .new-btn { background:#007bff; color:white; }

    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:15px; margin-top:20px; }
    .card { background:white; padding:10px; border-radius:8px; position:relative; }

    .modal {
      display:none;
      position:fixed;
      top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.5);
      justify-content:center;
      align-items:center;
    }
    .modal-content {
      background:white;
      padding:20px;
      width:300px;
      border-radius:10px;
    }
    input, textarea {
      width:100%; margin-bottom:10px; padding:5px;
    }
    .actions { display:flex; justify-content:flex-end; gap:10px; }
  </style>
</head>
<body>

<div class="top">
  <h1>Products (<span id="count">0</span>)</h1>
  <h1>Products</h1>
  <button class="btn new-btn" id="newBtn">New</button>
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Add Product</h3>
    <input id="pTitle" placeholder="Title" />
    <input id="pPrice" placeholder="Price" />
    <textarea id="pDesc" placeholder="Description"></textarea>

    <div class="actions">
      <button class="btn" id="cancelBtn">Cancel</button>
      <button class="btn new-btn" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
